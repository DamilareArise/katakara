{% extends "common.html" %}
    {% block content %}
    {% load static %}

    <img src="{% static "images/wall1.jpg" %}" alt="" height="200">
    <h3>Welcome back {{ name }}</h3>
    {% if 'Admin' in roles  %}
        <b class="box">Admin</b>
    {% else %}
        <b>Customer</b>
    {% endif %}
    <ul>
        {% for role in roles %}
          <li>{{ role }}</li>
        {% endfor %}
    </ul>

    {% endblock content %}
